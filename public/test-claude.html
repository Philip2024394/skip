<!DOCTYPE html>
<html>
<head>
    <title>Claude API Test</title>
</head>
<body>
    <h1>Claude API Connection Test</h1>
    <button onclick="testClaudeAPI()">Test API Connection</button>
    <div id="result"></div>

    <script type="module">
        window.testClaudeAPI = async function() {
            const resultDiv = document.getElementById('result');
            
            // Check if API key is available
            const apiKey = import.meta.env.VITE_CLAUDE_API_KEY;
            
            if (!apiKey) {
                resultDiv.innerHTML = '❌ API key not found in environment variables';
                console.log('Available VITE_ env vars:', Object.keys(import.meta.env).filter(k => k.startsWith('VITE_')));
                return;
            }
            
            resultDiv.innerHTML = '✅ API key found: ' + apiKey.substring(0, 20) + '...';
            
            try {
                // Test API call
                const response = await fetch('https://api.anthropic.com/v1/messages', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-api-key': apiKey,
                        'anthropic-version': '2023-06-01'
                    },
                    body: JSON.stringify({
                        model: 'claude-3-haiku-20240307',
                        max_tokens: 10,
                        messages: [{ role: 'user', content: 'Say "Hello"' }]
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    resultDiv.innerHTML = '✅ API Connected Successfully!<br>Response: ' + JSON.stringify(data.content?.[0]?.text || data);
                } else {
                    resultDiv.innerHTML = '❌ API Error: ' + JSON.stringify(data);
                }
                
            } catch (error) {
                resultDiv.innerHTML = '❌ Network Error: ' + error.message;
            }
        };
    </script>
</body>
</html>
