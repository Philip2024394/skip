<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>SkipTheApp - Connect Instantly</title>
    <meta name="description" content="WhatsApp Dating — skip the small talk, connect directly.">
    <meta name="author" content="SkipTheApp" />

    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Theme -->
    <meta name="theme-color" content="#000000" />

    <!-- Android / Chrome PWA -->
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- iOS Safari PWA — full screen, no address bar -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SkipTheApp" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icon-512.png" />

    <!-- iOS splash screen (optional — add real splash PNGs for best results) -->
    <meta name="apple-touch-fullscreen" content="yes" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
    <link rel="shortcut icon" href="/favicon.ico" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="SkipTheApp - Connect Instantly" />
    <meta property="og:description" content="WhatsApp Dating — skip the small talk, connect directly." />
    <meta property="og:image" content="/icon-512.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@SkipTheApp" />
    <meta name="twitter:title" content="SkipTheApp - Connect Instantly" />
    <meta name="twitter:description" content="WhatsApp Dating — skip the small talk, connect directly." />
    <meta name="twitter:image" content="/icon-512.png" />
  </head>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
